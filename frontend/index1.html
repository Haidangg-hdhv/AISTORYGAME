<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hành Trình Huyền Thoại</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #08090c;
      --bg2:       #0d0f14;
      --panel:     #111318;
      --panel2:    #161920;
      --border:    #242830;
      --border2:   #2e3340;
      --text:      #e8dfc8;
      --text2:     #c4b99a;
      --muted:     #7a7060;
      --gold:      #c9a84c;
      --gold2:     #a87c2a;
      --gold-glow: rgba(201,168,76,0.15);
      --red:       #c44;
      --ink:       rgba(201,168,76,0.06);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Cormorant Garamond', serif;
      overflow: hidden;
    }

    /* ── CANVAS PARTICLES ── */
    #canvas {
      position: fixed;  
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    /* ── LAYOUT ── */
    #shell {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr 300px;
      grid-template-rows: 60px 1fr 72px;
      height: 100vh;
      gap: 0;
    }

    /* ── HEADER ── */
    #header {
      grid-column: 1 / 3;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(201,168,76,0.04) 0%, transparent 100%);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-rune {
      width: 36px;
      height: 36px;
      border: 1.5px solid var(--gold2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cinzel', serif;
      font-size: 16px;
      color: var(--gold);
      background: radial-gradient(circle, rgba(201,168,76,0.12) 0%, transparent 70%);
      box-shadow: 0 0 16px rgba(201,168,76,0.2), inset 0 0 8px rgba(201,168,76,0.05);
      animation: pulse-rune 4s ease-in-out infinite;
    }

    @keyframes pulse-rune {
      0%, 100% { box-shadow: 0 0 16px rgba(201,168,76,0.2), inset 0 0 8px rgba(201,168,76,0.05); }
      50%       { box-shadow: 0 0 28px rgba(201,168,76,0.4), inset 0 0 14px rgba(201,168,76,0.12); }
    }

    .brand-title {
        font-family: 'Cinzel', serif;
        font-size: 20px;
        font-weight: 600;
        color: var(--gold);
        letter-spacing: 0.16em;
        text-shadow: 0 0 24px rgba(201,168,76,0.45);
        }

    .brand-sub {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-top: 2px;
    }

    /* ── START BAR ── */
    #start-bar {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #playerNameInput {
      width: 200px;
      padding: 8px 14px;
      background: var(--panel2);
      border: 1px solid var(--border2);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Cormorant Garamond', serif;
      font-size: 18px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    #playerNameInput::placeholder { color: var(--muted); }

    #playerNameInput:focus {
      border-color: var(--gold2);
      box-shadow: 0 0 0 3px rgba(201,168,76,0.1);
    }

    #startBtn {
      padding: 8px 16px;
      background: linear-gradient(135deg, #b8882a, #c9a84c, #a87830);
      border: none;
      border-radius: 8px;
      color: #0a0806;
      font-family: 'Cinzel', serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: filter 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    #startBtn:hover  { filter: brightness(1.15); transform: translateY(-1px); }
    #startBtn:active { transform: translateY(0); }
    #startBtn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* ── MAIN LOG ── */
    #log-wrap {
      grid-column: 1;
      grid-row: 2;
      overflow: hidden;
      position: relative;
      border-right: 1px solid var(--border);
    }

    /* Fade out top */
    #log-wrap::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 48px;
      background: linear-gradient(180deg, var(--bg) 0%, transparent 100%);
      z-index: 2;
      pointer-events: none;
    }

    #log {
      height: 100%;
      overflow-y: auto;
      padding: 24px 32px 24px 32px;
      scroll-behavior: smooth;
    }

    #log::-webkit-scrollbar { width: 4px; }
    #log::-webkit-scrollbar-track { background: transparent; }
    #log::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    /* ── SYSTEM LOG ── */
    .system-log {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-align: center;
      margin: 8px 0;
      opacity: 0.7;
    }

    .system-log::before { content: '— '; }
    .system-log::after  { content: ' —'; }

    /* ── TURN CARD ── */
    .turn-card {
      margin: 20px 0;
      animation: fade-up 0.4s ease both;
    }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .turn-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .turn-num {
      font-family: 'Cinzel', serif;
      font-size: 10px;
      color: var(--gold2);
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .turn-action-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 3px 10px;
      background: rgba(201,168,76,0.08);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 20px;
      font-size: 13px;
      color: var(--text2);
      font-style: italic;
    }

    .turn-action-badge::before {
      content: '❯';
      color: var(--gold);
      font-size: 10px;
      font-style: normal;
    }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border2) 20%, var(--border2) 80%, transparent);
      margin: 12px 0;
    }

    .turn-story {
        font-family: 'Cormorant Garamond', serif;
        font-size: 22px;
        line-height: 1.75;
        color: #efe6d2;
        font-weight: 400; 
        white-space: pre-wrap;
        letter-spacing: 0.02em;
        text-shadow: 0 0 6px rgba(0,0,0,0.4);
        }
        .turn-story::first-letter {
            font-size: 32px;
            font-weight: 600;
            color: #c9a84c;
            }

    .turn-story.typing::after {
      content: '▍';
      animation: blink 0.7s step-end infinite;
      color: var(--gold);
      font-size: 14px;
      vertical-align: middle;
    }

    @keyframes blink { 50% { opacity: 0; } }

    /* ── CHOICES ── */
    .choices-label {
      font-family: 'Cinzel', serif;
      font-size: 10px;
      color: var(--gold2);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin: 20px 0 10px 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .choices-label::before,
    .choices-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border2));
    }

    .choices-label::after {
      background: linear-gradient(90deg, var(--border2), transparent);
    }

    .turn-choices {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .choice-btn {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      width: 100%;
      padding: 12px 16px;
      background: var(--panel);
      border: 1px solid var(--border2);
      border-radius: 10px;
      color: var(--text2);
      font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
      cursor: pointer;
      text-align: left;
      transition: background 0.15s, border-color 0.15s, color 0.15s, transform 0.1s;
      line-height: 1.5;
    }

    .choice-num {
      font-family: 'Cinzel', serif;
      font-size: 11px;
      color: var(--gold2);
      min-width: 18px;
      padding-top: 2px;
    }

    .choice-btn:hover {
      background: rgba(201,168,76,0.07);
      border-color: rgba(201,168,76,0.35);
      color: var(--text);
      transform: translateX(3px);
    }

    .choice-btn:active { transform: translateX(1px); }

    /* ── INPUT BAR ── */
    #input-bar {
      grid-column: 1;
      grid-row: 3;
      border-right: 1px solid var(--border);
      border-top: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(0deg, rgba(201,168,76,0.025) 0%, transparent 100%);
    }

    #actionInput {
      flex: 1;
      padding: 12px 18px;
      background: var(--panel2);
      border: 1px solid var(--border2);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Cormorant Garamond', serif;
        font-size: 18px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    #actionInput::placeholder { color: var(--muted); font-style: italic; }

    #actionInput:focus {
      border-color: var(--gold2);
      box-shadow: 0 0 0 3px rgba(201,168,76,0.08);
    }

    #sendBtn {
      padding: 12px 22px;
      background: linear-gradient(135deg, #b8882a, #c9a84c);
      border: none;
      border-radius: 10px;
      color: #0a0806;
      font-family: 'Cinzel', serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: filter 0.2s, transform 0.1s, box-shadow 0.2s;
      box-shadow: 0 2px 16px rgba(201,168,76,0.2);
    }

    #sendBtn:hover {
      filter: brightness(1.15);
      transform: translateY(-1px);
      box-shadow: 0 4px 24px rgba(201,168,76,0.35);
    }

    #sendBtn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    /* ── SIDEBAR ── */
    #side {
      grid-column: 2;
      grid-row: 2 / 4;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      background: var(--bg2);
    }

    #side::-webkit-scrollbar { width: 3px; }
    #side::-webkit-scrollbar-thumb { background: var(--border); }

    .side-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .side-card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: linear-gradient(90deg, rgba(201,168,76,0.06) 0%, transparent 100%);
      border-bottom: 1px solid var(--border);
    }

    .side-card-icon {
      font-size: 14px;
    }

    .side-card-title {
      font-family: 'Cinzel', serif;
      font-size: 11px;
      font-weight: 600;
      color: var(--gold);
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .side-card-body {
      padding: 14px;
    }

    /* HP Bar */
    .stat-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .stat-label {
      font-family: 'Cinzel', serif;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.12em;
    }

    .stat-val {
      font-family: 'Cinzel', serif;
      font-size: 13px;
      color: var(--gold);
    }

    .hp-bar-bg {
      height: 5px;
      background: var(--border2);
      border-radius: 3px;
      margin-bottom: 12px;
      overflow: hidden;
    }

    .hp-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #b84444, #e05555);
      border-radius: 3px;
      transition: width 0.6s ease;
      box-shadow: 0 0 8px rgba(200,68,68,0.4);
    }

    /* State text */
    #state {
      font-size: 14px;
      color: var(--text2);
      line-height: 1.8;
    }

    .state-item {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 4px 0;
      border-bottom: 1px solid var(--border);
    }

    .state-item:last-child { border-bottom: none; }

    .state-key {
      font-family: 'Cinzel', serif;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    .state-value {
      font-size: 14px;
      color: var(--text);
    }

    /* Lore card */
    .lore-text {
      font-size: 13px;
      font-style: italic;
      color: var(--muted);
      line-height: 1.7;
      text-align: center;
    }

    /* Loading spinner */
    .loading-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 0;
      color: var(--muted);
      font-size: 14px;
      font-style: italic;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid var(--border2);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Hint */
    .hint-text {
      font-size: 12px;
      color: var(--muted);
      font-style: italic;
      text-align: center;
      padding: 8px 0;
      letter-spacing: 0.03em;
    }

    /* No-session state */
    #no-session-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 12px;
      opacity: 0.5;
    }

    .no-session-rune {
      font-size: 48px;
      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-8px); }
    }

    .no-session-text {
      font-family: 'Cinzel', serif;
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0.15em;
    }

    /* Scrollbar for log */
    #log::-webkit-scrollbar { width: 5px; }
    #log::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

    /* Responsive tweak */
    @media (max-width: 700px) {
      #shell { grid-template-columns: 1fr; grid-template-rows: 56px 1fr 56px auto; }
      #side { grid-column: 1; grid-row: 4; max-height: 200px; border-top: 1px solid var(--border); }
      #input-bar { grid-column: 1; }
      #log-wrap { grid-column: 1; border-right: none; }
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <div id="shell">
    <!-- HEADER -->
    <header id="header">
      <div class="brand">
        <div class="brand-rune">⚔</div>
        <div>
          <div class="brand-title">Hành Trình Huyền Thoại</div>
          <div class="brand-sub">AI Story Adventure</div>
        </div>
      </div>
      <div id="start-bar">
        <input id="playerNameInput" placeholder="Tên nhân vật…" autocomplete="off" />
        <button id="startBtn" type="button">✦ Bắt đầu</button>
      </div>
    </header>

    <!-- LOG -->
    <div id="log-wrap">
      <div id="log">
        <div id="no-session-screen">
          <div class="no-session-rune">🏔</div>
          <div class="no-session-text">Nhập tên và bắt đầu cuộc phiêu lưu…</div>
        </div>
      </div>
    </div>

    <!-- INPUT BAR -->
    <div id="input-bar">
      <input id="actionInput" placeholder="Bạn làm gì tiếp theo…" autocomplete="off" />
      <button id="sendBtn" type="button">Gửi ❯</button>
    </div>

    <!-- SIDEBAR -->
    <aside id="side">
      <div class="side-card">
        <div class="side-card-header">
          <span class="side-card-icon">🛡</span>
          <span class="side-card-title">Trạng Thái</span>
        </div>
        <div class="side-card-body" id="state-body">
          <div class="lore-text">Chưa có phiên...</div>
        </div>
      </div>

      <div class="side-card">
        <div class="side-card-header">
          <span class="side-card-icon">📜</span>
          <span class="side-card-title">Lời Tiên Tri</span>
        </div>
        <div class="side-card-body">
          <p class="lore-text">"Mỗi lựa chọn đều viết nên một trang sử mới. Số phận nằm trong tay ngươi."</p>
        </div>
      </div>

      <div class="side-card" id="session-card" style="display:none">
        <div class="side-card-header">
          <span class="side-card-icon">🔮</span>
          <span class="side-card-title">Phiên Chơi</span>
        </div>
        <div class="side-card-body" id="session-body">
          <div class="lore-text">—</div>
        </div>
      </div>
    </aside>
  </div>

  <script>
    /* ── PARTICLES ── */
    (function () {
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');
      let W, H, particles = [];

      function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
      }

      function Particle() {
        this.x = Math.random() * W;
        this.y = Math.random() * H;
        this.r = Math.random() * 1.2 + 0.3;
        this.a = Math.random() * Math.PI * 2;
        this.speed = Math.random() * 0.2 + 0.05;
        this.alpha = Math.random() * 0.25 + 0.05;
        this.drift = (Math.random() - 0.5) * 0.3;
      }

      function init() {
        resize();
        particles = Array.from({ length: 90 }, () => new Particle());
      }

      function draw() {
        ctx.clearRect(0, 0, W, H);
        for (const p of particles) {
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(201,168,76,${p.alpha})`;
          ctx.fill();
          p.y -= p.speed;
          p.x += p.drift;
          if (p.y < -4) { p.y = H + 4; p.x = Math.random() * W; }
          if (p.x < -4 || p.x > W + 4) p.x = Math.random() * W;
        }
        requestAnimationFrame(draw);
      }

      window.addEventListener('resize', resize);
      init();
      draw();
    })();

    /* ── APP ── */
    let sessionId = sessionStorage.getItem("sessionId") || null;
    let isStartingGame = false;
    let isSendingAction = false;
    let turnCounter = 0;

    const API = "http://127.0.0.1:8000";

    const playerNameInput = document.getElementById("playerNameInput");
    const startBtn        = document.getElementById("startBtn");
    const actionInput     = document.getElementById("actionInput");
    const sendBtn         = document.getElementById("sendBtn");
    const logBox          = document.getElementById("log");
    const stateBody       = document.getElementById("state-body");

    startBtn.addEventListener("click", startGame);
    sendBtn.addEventListener("click", () => sendAction());
    actionInput.addEventListener("keydown", e => {
      if (e.key === "Enter") { e.preventDefault(); sendAction(); }
    });

    window.addEventListener("load", async () => {
      if (sessionId) {
        clearLog();
        addSystemLog("Đã khôi phục phiên: " + sessionId);
        await refreshState();
      }
    });

    async function startGame() {
      if (isStartingGame) return;
      const playerName = playerNameInput.value.trim();
      if (!playerName) { alert("Hãy nhập tên nhân vật trước."); return; }

      isStartingGame = true;
      startBtn.disabled = true;

      try {
        const res = await fetch(API + "/game/start", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
                world_id: "dark_fantasy",
                player_name: playerName,
                background: "kẻ lang thang mất ký ức",
                personality_traits: ["đa nghi", "gan lì"],
                virtues: ["trung thành"],
                flaws: ["nóng nảy"],
                fears: ["bị kiểm soát"],
                goals: ["tìm lại quá khứ"]
                })
        });

        if (!res.ok) throw new Error(await res.text());

        const data = await res.json();
        sessionId = data.session_id;
        sessionStorage.setItem("sessionId", sessionId);

        turnCounter = 0;
        clearLog();
        addSystemLog("Phiêu lưu bắt đầu · " + playerName);
        await refreshState();
      } catch (err) {
        console.error(err);
        alert(err.message || "Có lỗi khi bắt đầu game.");
      } finally {
        isStartingGame = false;
        startBtn.disabled = false;
      }
    }

    async function sendAction(content = null) {
      if (isSendingAction) return;
      if (!sessionId) { alert("Hãy bắt đầu game trước."); return; }

      const action = (content || actionInput.value).trim();
        if (!action) return;

        clearAllChoicePanels();

        renderPlayerAction(action);

      isSendingAction = true;
      sendBtn.disabled = true;
      actionInput.value = "";

      // Show loading
      const loadingEl = appendLoading();

      try {
        const res = await fetch(API + "/game/turn", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ session_id: sessionId, action_type: "talk", content: action })
        });

        if (!res.ok) throw new Error(await res.text());

        const data = await res.json();
        turnCounter += 1;

        loadingEl.remove();
        const choices = (data.choices && data.choices.length > 0)
        ? data.choices
        : parseChoicesFromText(data.narrative || "");

        renderTurn(action, data.narrative || "", choices);
        await refreshState();
      } catch (err) {
        loadingEl.remove();
        console.error(err);
        alert(err.message || "Có lỗi khi gửi hành động.");
      } finally {
        isSendingAction = false;
        sendBtn.disabled = false;
      }
    }

    function appendLoading() {
      const el = document.createElement("div");
      el.className = "loading-row";
      el.innerHTML = `<div class="spinner"></div><span>Đang kể chuyện…</span>`;
      logBox.appendChild(el);
      logBox.scrollTop = logBox.scrollHeight;
      return el;
    }

    function renderTurn(playerAction, narrative, choices) {
        const card = document.createElement("div");
        card.className = "turn-card";

        const header = document.createElement("div");
        header.className = "turn-header";
        header.innerHTML = `
            <span class="turn-num">Lượt ${turnCounter}</span>
            <span class="turn-action-badge">${esc(playerAction)}</span>
        `;

        const divider = document.createElement("div");
        divider.className = "divider";

        const story = document.createElement("div");
        story.className = "turn-story typing";

        card.appendChild(header);
        card.appendChild(divider);
        card.appendChild(story);

        logBox.appendChild(card);
        logBox.scrollTop = logBox.scrollHeight;

        const cleaned = cleanNarrative(String(narrative || ""), choices);
        let i = 0;
        const BATCH = 3;

        function typeNext() {
            if (i < cleaned.length) {
            story.innerText = cleaned.slice(0, i + BATCH);
            i += BATCH;
            logBox.scrollTop = logBox.scrollHeight;
            requestAnimationFrame(typeNext);
            return;
            }

            story.innerText = cleaned;
            story.classList.remove("typing");

            if (choices.length > 0) {
            const label = document.createElement("div");
            label.className = "choices-label";
            label.innerText = "Lựa chọn";

            const choicesBox = document.createElement("div");
            choicesBox.className = "turn-choices";

            choices.forEach((c, idx) => {
            const cleanChoice = normalizeChoice(c);
            if (!cleanChoice) return;

            const btn = document.createElement("button");
            btn.type = "button";
            btn.className = "choice-btn";
            btn.innerHTML = `<span class="choice-num">${idx + 1}.</span>${esc(cleanChoice)}`;
            btn.addEventListener("click", () => sendAction(cleanChoice));
            choicesBox.appendChild(btn);
        });

            card.appendChild(label);
            card.appendChild(choicesBox);
            logBox.scrollTop = logBox.scrollHeight;
            }
        }

        typeNext();
        }
    
    function renderPlayerAction(action) {
        const bubble = document.createElement("div");
        bubble.style.cssText = `
            display: flex;
            justify-content: flex-end;
            margin: 12px 0;
            animation: fade-up 0.3s ease both;
        `;

        bubble.innerHTML = `
            <div style="
            max-width: 70%;
            padding: 10px 16px;
            background: rgba(201,168,76,0.1);
            border: 1px solid rgba(201,168,76,0.25);
            border-radius: 14px 14px 4px 14px;
            font-family: 'Cormorant Garamond', serif;
            font-size: 15px;
            color: var(--text2);
            font-style: italic;
            line-height: 1.5;
            ">💬 ${esc(action)}</div>
        `;

        logBox.appendChild(bubble);
        logBox.scrollTop = logBox.scrollHeight;
        }

    function cleanNarrative(text, choices = []) {
        const lines = String(text).split("\n");

        const markerPattern = /\[\s*(?:lựa\s*chọn|chọn|bước\s*hành\s*động|hành\s*động)\s*\]/iu;
        const genericChoicesPattern = /^choices\s*:/iu;
        const numberedChoicePattern = /^(?:\d+[\.\)]|[IVXivx]+\.|[-*])\s+(.+)$/;

        const normalizedChoices = choices.map(c =>
            String(c).trim().toLowerCase()
        );

        const cleanedLines = [];
        let choiceStarted = false;

        for (const rawLine of lines) {
            const line = rawLine.trim();

            if (!line) {
            if (!choiceStarted) cleanedLines.push("");
            continue;
            }

            // Gặp marker choice thì cắt luôn từ đây
            if (markerPattern.test(line) || genericChoicesPattern.test(line)) {
            choiceStarted = true;
            continue;
            }

            // Gặp dòng dạng 1. ... / 2) ... / I. ... / - ...
            const match = line.match(numberedChoicePattern);
            if (match) {
            const candidate = match[1].trim().toLowerCase();

            // Nếu backend đã parse choice và dòng này giống 1 choice thì bắt đầu cắt
            if (
                normalizedChoices.length > 0 &&
                normalizedChoices.some(choice => candidate === choice)
            ) {
                choiceStarted = true;
                continue;
            }

            // Nếu chưa có choices nhưng line quá giống line lựa chọn thì cũng cắt
            if (normalizedChoices.length === 0) {
                choiceStarted = true;
                continue;
            }
            }

            if (!choiceStarted) {
            cleanedLines.push(rawLine);
            }
        }

        return cleanedLines.join("\n").trim();
        }
    function parseChoicesFromText(text) {
            // Cắt lấy block [LỰA CHỌN] nếu có
            const blockMatch = text.match(/\[LỰA CHỌN\]([\s\S]*?)(?:\[|$)/i);
            const block = blockMatch ? blockMatch[1] : text;

            const pattern = /^\s*(?:\d+[.)]\s*|[-*•]\s+)(.+)$/gm;
            const choices = [];
            let m;
            while ((m = pattern.exec(block)) !== null) {
                const c = m[1].trim();
                if (c && c.length < 200) choices.push(c);
            }
            return choices.slice(0, 4);
            }
    function normalizeChoice(choice) {
        if (!choice) return "";

        if (typeof choice === "string") {
            const text = choice.trim();

            // Trường hợp string bình thường
            if (!text.includes("choice")) {
            return text;
        }

            // Trường hợp string giả object
            const extracted = extractChoiceFromPseudoObject(text);
            return extracted || text;
        }

        if (typeof choice === "object") {
            if (choice.choice) return String(choice.choice).trim();
            if (choice.text) return String(choice.text).trim();
        }

        return "";
    }

    function extractChoiceFromPseudoObject(text) {
            try {
                // Bước 1: convert sang JSON gần đúng
                let fixed = text
                    .replace(/([{,]\s*)'([^']+?)'\s*:/g, '$1"$2":')   // key
                    .replace(/:\s*'([^']*?)'/g, ':"$1"');             // value

                const obj = JSON.parse(fixed);

                if (obj.choice) return obj.choice.trim();
            } catch (e) {
                // fallback regex mạnh hơn
                const match = text.match(/choice\s*[:=]\s*['"]([^'"]+)['"]/i);
                if (match) return match[1].trim();
            }

            return "";
        }

    function addSystemLog(text) {
      const div = document.createElement("div");
      div.className = "system-log";
      div.innerText = text;
      logBox.appendChild(div);
      logBox.scrollTop = logBox.scrollHeight;
    }

    function clearLog() {
      logBox.innerHTML = "";
    }
    function clearAllChoicePanels() {
        const allChoiceBlocks = document.querySelectorAll(".turn-choices, .choices-label");
        allChoiceBlocks.forEach(el => el.remove());
        }

    function esc(str) {
    return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    async function refreshState() {
      if (!sessionId) return;

      try {
        const res = await fetch(API + "/game/" + sessionId);
        if (!res.ok) return;

        const data = await res.json();
        const hp = data.hp ?? 100;

        document.getElementById("session-card").style.display = "block";

        stateBody.innerHTML = `
          <div class="stat-row">
            <span class="stat-label">HP</span>
            <span class="stat-value" style="font-family:'Cinzel',serif;font-size:13px;color:#e05555">${hp}</span>
          </div>
          <div class="hp-bar-bg">
            <div class="hp-bar-fill" style="width:${Math.min(100,hp)}%"></div>
          </div>
          <div class="state-item">
            <span class="state-key">Nhân vật</span>
            <span class="state-value">${esc(String(data.player_name || "—"))}</span>
          </div>
          <div class="state-item">
            <span class="state-key">Địa điểm</span>
            <span class="state-value">${esc(String(data.location || "—"))}</span>
          </div>
          <div class="state-item">
            <span class="state-key">Lượt</span>
            <span class="state-value">${data.turn_count ?? 0}</span>
          </div>
        `;

        document.getElementById("session-body").innerHTML = `
          <div class="state-item">
            <span class="state-key">ID</span>
            <span class="state-value" style="font-size:11px;word-break:break-all;color:var(--muted)">${esc(String(data.session_id || "—"))}</span>
          </div>
        `;
      } catch (e) {
        console.error(e);
      }
    }
  </script>
